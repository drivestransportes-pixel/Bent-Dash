];

const ALL_DEFS=[
  {k:"sc",l:"Scratch",c:"#E63946"},
  {k:"op",l:"Orange Peel",c:"#F4A261"},
  {k:"co",l:"Contaminated",c:"#2A9D8F"},
  {k:"dr",l:"Drained",c:"#264653"},
  {k:"lu",l:"Lumps",c:"#E9C46A"},
  {k:"sm",l:"Sanding Mark",c:"#7B2CBF"},
  {k:"fi",l:"Fiber",c:"#06D6A0"},
  {k:"po",l:"Pore/Pin Hole",c:"#118AB2"}
];
const GOAL=5;

function linReg(pts){const n=pts.length;if(n<2)return{slope:0,intercept:0};let sx=0,sy=0,sxy=0,sxx=0;pts.forEach((p,i)=>{sx+=i;sy+=p.sr;sxy+=i*p.sr;sxx+=i*i;});const d=n*sxx-sx*sx;return{slope:(n*sxy-sx*sy)/d,intercept:(sy*sxx-sx*sxy)/d};}
function calcMed(arr){const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:+((s[m-1]+s[m])/2).toFixed(1);}

function App(){
  const[view,setView]=useState("overview");
  const[active,setActive]=useState(()=>{const m={};ALL_DEFS.forEach(d=>{m[d.k]=!["sc","sm","fi"].includes(d.k);});return m;});
  const[idFrom,setIdFrom]=useState(1);
  const[idTo,setIdTo]=useState(138);
  const[tmpFrom,setTmpFrom]=useState("1");
  const[tmpTo,setTmpTo]=useState("138");
  const applyIdFilter=()=>{
    const f=Math.max(1,Math.min(138,parseInt(tmpFrom)||1));
    const t=Math.max(f,Math.min(138,parseInt(tmpTo)||138));
    setIdFrom(f);setIdTo(t);setTmpFrom(String(f));setTmpTo(String(t));
  };
  const resetIdFilter=()=>{setIdFrom(1);setIdTo(138);setTmpFrom("1");setTmpTo("138");};
  const FILTERED_RAW=useMemo(()=>RAW.filter(r=>r.id>=idFrom&&r.id<=idTo),[idFrom,idTo]);

  const toggle=(k)=>setActive(prev=>({...prev,[k]:!prev[k]}));
  const activeDefs=ALL_DEFS.filter(d=>active[d.k]);
  const excludedKeys=ALL_DEFS.filter(d=>!active[d.k]).map(d=>d.k);

  // Recompute scrap rate excluding toggled-off defects
  const filtered=useMemo(()=>{
    return FILTERED_RAW.map(r=>{
      const excluded=excludedKeys.reduce((s,k)=>s+r[k],0);
      const adjR=Math.max(0,r.r-excluded);
      const adjSR=r.p>0?+(adjR/r.p*100).toFixed(1):0;
      return{...r,sr_adj:adjSR,r_adj:adjR};
    });
  },[active,idFrom,idTo]);

  const chartData=useMemo(()=>{
    const{slope,intercept}=linReg(filtered.map(r=>({sr:r.sr_adj})));
    return filtered.map((p,i)=>({
      ...p,
      trend:+(intercept+slope*i).toFixed(1),
      ma:i>=3?+((filtered[i].sr_adj+filtered[i-1].sr_adj+filtered[i-2].sr_adj+filtered[i-3].sr_adj)/4).toFixed(1):null,
    }));
  },[filtered]);

  const med=filtered.length>0?calcMed(filtered.map(r=>r.sr_adj)):0;
  const{slope}=filtered.length>1?linReg(filtered.map(r=>({sr:r.sr_adj}))):{slope:0};
  const n=filtered.length;
  const tP=filtered.reduce((s,r)=>s+r.p,0);
  const tR_adj=filtered.reduce((s,r)=>s+r.r_adj,0);
  const tR_orig=filtered.reduce((s,r)=>s+r.r,0);
  const rate=tP>0?(tR_adj/tP*100).toFixed(1):"0.0";
  const atGoal=filtered.filter(r=>r.sr_adj<=GOAL).length;
  const excludedTotal=tR_orig-tR_adj;

  const pareto=useMemo(()=>{
    const tots=activeDefs.map(d=>({...d,total:FILTERED_RAW.reduce((s,r)=>s+r[d.k],0)})).sort((a,b)=>b.total-a.total);
    const grand=tots.reduce((s,d)=>s+d.total,0);let cum=0;
    return tots.map(d=>{cum+=d.total;return{...d,pct:grand>0?+(d.total/grand*100).toFixed(1):0,cumPct:grand>0?+(cum/grand*100).toFixed(1):0};});
  },[active,idFrom,idTo]);

  const tabs=[{id:"overview",l:"Overview"},{id:"pareto",l:"Pareto"},{id:"defects",l:"Defect Trends"},{id:"monthly",l:"Monthly"}];

  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0B0F19",color:"#E8E8EC",minHeight:"100vh",padding:"24px 20px"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
      <div style={{maxWidth:980,margin:"0 auto"}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:2,color:"#F4A261",textTransform:"uppercase",marginBottom:4}}>Benteng / Propaint — Interactive</div>
          <h1 style={{fontSize:22,fontWeight:700,margin:0}}>PROPAINT Scrap Analysis — Defect Filter</h1>
          <div style={{fontSize:12,color:"#888",marginTop:4}}>Jan 15 — Mar 31, 2026 &middot; {RAW.length} total batches &middot; Toggle defects and filter IDs to recalculate</div>
        </div>

        {/* ── ID RANGE FILTER ── */}
        <div style={{background:"#141826",borderRadius:10,padding:"14px 16px",border:"1px solid #1E2335",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <div style={{fontSize:11,color:"#777",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:1}}>Batch ID Range</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:"#999"}}>From</span>
              <input value={tmpFrom} onChange={e=>setTmpFrom(e.target.value)} onKeyDown={e=>e.key==="Enter"&&applyIdFilter()}
                style={{width:52,padding:"6px 8px",borderRadius:6,border:"1px solid #2A2F45",background:"#0B0F19",color:"#E8E8EC",fontSize:13,fontFamily:"'DM Mono',monospace",textAlign:"center"}}/>
              <span style={{fontSize:11,color:"#999"}}>To</span>
              <input value={tmpTo} onChange={e=>setTmpTo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&applyIdFilter()}
                style={{width:52,padding:"6px 8px",borderRadius:6,border:"1px solid #2A2F45",background:"#0B0F19",color:"#E8E8EC",fontSize:13,fontFamily:"'DM Mono',monospace",textAlign:"center"}}/>
              <button onClick={applyIdFilter} style={{padding:"6px 14px",borderRadius:6,border:"none",background:"#F4A261",color:"#0B0F19",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Apply</button>
              <button onClick={resetIdFilter} style={{padding:"6px 14px",borderRadius:6,border:"1px solid #2A2F45",background:"transparent",color:"#888",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Reset</button>
            </div>
            <div style={{fontSize:11,color:idFrom===1&&idTo===138?"#555":"#F4A261"}}>
              {idFrom===1&&idTo===138?`All ${RAW.length} batches`:`Showing IDs ${idFrom}–${idTo} (${n} of ${RAW.length} batches)`}
            </div>
            {/* Quick presets */}
            <div style={{display:"flex",gap:4}}>
              {[{l:"Jan",f:1,t:66},{l:"Feb",f:67,t:82},{l:"Mar",f:83,t:138},{l:"Original",f:1,t:126},{l:"PDF only",f:127,t:138},{l:"All",f:1,t:138}].map(p=>(
                <button key={p.l} onClick={()=>{setIdFrom(p.f);setIdTo(p.t);setTmpFrom(String(p.f));setTmpTo(String(p.t));}}
                  style={{padding:"4px 10px",borderRadius:5,border:idFrom===p.f&&idTo===p.t?"1px solid #F4A261":"1px solid #2A2F45",background:idFrom===p.f&&idTo===p.t?"rgba(244,162,97,0.15)":"transparent",color:idFrom===p.f&&idTo===p.t?"#F4A261":"#666",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{p.l}</button>
              ))}
            </div>
          </div>
        </div>

        {/* ── DEFECT TOGGLE BUTTONS ── */}
        <div style={{background:"#141826",borderRadius:10,padding:"14px 16px",border:"1px solid #1E2335",marginBottom:20}}>
          <div style={{fontSize:11,color:"#777",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Defect Filters (click to toggle)</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ALL_DEFS.map(d=>{
              const total=FILTERED_RAW.reduce((s,r)=>s+r[d.k],0);
              const on=active[d.k];
              return(
                <button key={d.k} onClick={()=>toggle(d.k)} style={{
                  display:"flex",alignItems:"center",gap:6,
                  padding:"8px 14px",borderRadius:8,cursor:"pointer",
                  border:on?`2px solid ${d.c}`:"2px solid #2A2F45",
                  background:on?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.01)",
                  opacity:on?1:0.4,
                  transition:"all .15s",fontFamily:"inherit"
                }}>
                  <span style={{width:12,height:12,borderRadius:3,background:on?d.c:"#444",display:"inline-block",transition:"all .15s"}}/>
                  <span style={{fontSize:12,fontWeight:600,color:on?"#E8E8EC":"#666"}}>{d.l}</span>
                  <span style={{fontSize:10,color:on?"#999":"#555",fontFamily:"'DM Mono',monospace"}}>{total.toLocaleString()}</span>
                  <span style={{fontSize:9,color:on?"#2A9D8F":"#E63946",fontWeight:700}}>{on?"ON":"OFF"}</span>
                </button>
              );
            })}
          </div>
          {excludedTotal>0&&(
            <div style={{marginTop:10,fontSize:11,color:"#F4A261"}}>
              Excluding {excludedKeys.map(k=>ALL_DEFS.find(d=>d.k===k).l).join(", ")} = {excludedTotal.toLocaleString()} parts removed from reject count. Adjusted rate: {rate}% (original: {(tR_orig/tP*100).toFixed(1)}%)
            </div>
          )}
        </div>

        {/* ── KPI STRIP ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:20}}>
          {[{l:"Painted",v:tP.toLocaleString(),s:`${n} of ${RAW.length} batches`},{l:"Adj. Rejected",v:tR_adj.toLocaleString(),s:`excl. ${excludedTotal} parts`,a:true},{l:"Adj. Scrap Rate",v:`${rate}%`,s:`Goal: ${GOAL}% | Med: ${med}%`,a:true},{l:"Batches at Goal",v:`${atGoal}/${n}`,s:`<=${GOAL}% adj.`,g:true},{l:"Trend",v:slope<-0.05?"Improving":slope>0.05?"Worsening":"Flat",s:`slope: ${slope>0?"+":""}${slope.toFixed(3)}/batch`,a:slope>0,g:slope<0}].map((k,i)=>(
            <div key={i} style={{background:"#141826",borderRadius:10,padding:"14px 12px",border:"1px solid #1E2335"}}><div style={{fontSize:10,color:"#777",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{k.l}</div><div style={{fontSize:20,fontWeight:700,color:k.a?"#E63946":k.g?"#2A9D8F":"#E8E8EC"}}>{k.v}</div><div style={{fontSize:10,color:"#555",marginTop:2}}>{k.s}</div></div>
          ))}
        </div>

        {/* ── TABS ── */}
        <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:"1px solid #1E2335",paddingBottom:1}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={{background:view===t.id?"#1E2335":"transparent",color:view===t.id?"#F4A261":"#666",border:"none",borderRadius:"6px 6px 0 0",padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>)}
        </div>

        {/* ── OVERVIEW ── */}
        {view==="overview"&&(<div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Adjusted Scrap Rate by Batch ID</div>
          <div style={{background:"#141826",borderRadius:10,padding:"16px 8px 8px 0",border:"1px solid #1E2335"}}><ResponsiveContainer width="100%" height={320}><ComposedChart data={chartData} margin={{left:10,right:16,top:5,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke="#1E2335"/>
            <XAxis dataKey="id" tick={{fontSize:9,fill:"#666"}} interval={9} label={{value:"Batch ID",position:"insideBottom",offset:-2,fill:"#555",fontSize:10}}/>
            <YAxis tick={{fontSize:10,fill:"#666"}} unit="%" domain={[0,100]}/>
            <Tooltip contentStyle={{background:"#1A1F30",border:"1px solid #2A2F45",borderRadius:8,fontSize:12}} formatter={(v,n)=>[`${v}%`,n]} labelFormatter={l=>{const r=FILTERED_RAW.find(x=>x.id===l);return r?`ID ${l} (${r.d})`:`ID ${l}`;}}/>
            <Legend wrapperStyle={{fontSize:10}}/>
            <Bar dataKey="sr_adj" name="Adj. Scrap Rate %">{chartData.map((d,i)=><Cell key={i} fill={d.id>=127?"#F4A261":"#E63946"} fillOpacity={0.35}/>)}</Bar>
            <Line dataKey="trend" name="Linear Trend" stroke="#F4A261" strokeWidth={2} dot={false} strokeDasharray="6 3"/>
            <Line dataKey="ma" name="4-Period MA" stroke="#06D6A0" strokeWidth={2} dot={false} connectNulls/>
            <ReferenceLine y={GOAL} stroke="#2A9D8F" strokeWidth={2} strokeDasharray="8 4" label={{value:`Goal ${GOAL}%`,position:"right",fill:"#2A9D8F",fontSize:10,fontWeight:600}}/>
            <ReferenceLine y={med} stroke="#E9C46A" strokeWidth={1.5} strokeDasharray="4 4" label={{value:`Med ${med}%`,position:"left",fill:"#E9C46A",fontSize:10,fontWeight:600}}/>
          </ComposedChart></ResponsiveContainer></div>
          <div style={{display:"flex",gap:16,marginTop:6,marginLeft:12,fontSize:10,flexWrap:"wrap"}}><span style={{color:"#F4A261"}}>--- Trend</span><span style={{color:"#06D6A0"}}>--- 4P MA</span><span style={{color:"#2A9D8F"}}>--- Goal {GOAL}%</span><span style={{color:"#E9C46A"}}>--- Med {med}%</span><span style={{color:"#888"}}>Gap: {(med-GOAL).toFixed(1)} pp</span></div>

          <div style={{marginTop:20,fontSize:14,fontWeight:600,marginBottom:8}}>Active Defect Volume by Batch ID</div>
          <div style={{background:"#141826",borderRadius:10,padding:"16px 8px 8px 0",border:"1px solid #1E2335"}}><ResponsiveContainer width="100%" height={280}><AreaChart data={chartData} margin={{left:10,right:10,top:5,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke="#1E2335"/><XAxis dataKey="id" tick={{fontSize:9,fill:"#666"}} interval={9}/><YAxis tick={{fontSize:10,fill:"#666"}}/><Tooltip contentStyle={{background:"#1A1F30",border:"1px solid #2A2F45",borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:10}}/>{activeDefs.map(d=><Area key={d.k} type="monotone" dataKey={d.k} name={d.l} stackId="1" fill={d.c} stroke={d.c} fillOpacity={0.7}/>)}</AreaChart></ResponsiveContainer></div>
        </div>)}

        {/* ── PARETO ── */}
        {view==="pareto"&&(<div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Pareto — Active Defects Only ({activeDefs.length} of {ALL_DEFS.length} types)</div>
          <div style={{background:"#141826",borderRadius:10,padding:"16px 8px 8px 0",border:"1px solid #1E2335"}}><ResponsiveContainer width="100%" height={320}><ComposedChart data={pareto} margin={{left:10,right:30,top:5,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke="#1E2335"/><XAxis dataKey="l" tick={{fontSize:10,fill:"#999"}}/><YAxis yAxisId="left" tick={{fontSize:10,fill:"#666"}}/><YAxis yAxisId="right" orientation="right" tick={{fontSize:10,fill:"#666"}} unit="%" domain={[0,100]}/><Tooltip contentStyle={{background:"#1A1F30",border:"1px solid #2A2F45",borderRadius:8,fontSize:12}}/><Bar yAxisId="left" dataKey="total" name="Rejected Qty" radius={[4,4,0,0]}>{pareto.map((d,i)=><Cell key={i} fill={d.c}/>)}</Bar><Line yAxisId="right" dataKey="cumPct" name="Cumulative %" stroke="#F4A261" strokeWidth={2.5} dot={{r:4,fill:"#F4A261"}}/></ComposedChart></ResponsiveContainer></div>
          <div style={{marginTop:16,background:"#141826",borderRadius:10,border:"1px solid #1E2335",overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{borderBottom:"1px solid #1E2335"}}>{["Defect","Qty","% of Total","Cum %"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#777",fontWeight:500,fontFamily:"'DM Mono',monospace",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>{h}</th>)}</tr></thead><tbody>{pareto.map((d,i)=><tr key={i} style={{borderBottom:"1px solid #1A1E2E"}}><td style={{padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{width:10,height:10,borderRadius:2,background:d.c,display:"inline-block"}}/>{d.l}</td><td style={{padding:"8px 14px",fontFamily:"'DM Mono',monospace"}}>{d.total.toLocaleString()}</td><td style={{padding:"8px 14px",fontFamily:"'DM Mono',monospace"}}>{d.pct}%</td><td style={{padding:"8px 14px",fontFamily:"'DM Mono',monospace",color:d.cumPct<=80?"#E63946":"#666"}}>{d.cumPct}%</td></tr>)}</tbody></table></div>
        </div>)}

        {/* ── DEFECT TRENDS ── */}
        {view==="defects"&&(<div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Active Defect Trends by Batch ID</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {activeDefs.filter(d=>FILTERED_RAW.reduce((s,r)=>s+r[d.k],0)>0).map(d=>{
              const total=FILTERED_RAW.reduce((s,r)=>s+r[d.k],0);
              return(
                <div key={d.k} style={{background:"#141826",borderRadius:10,padding:"12px 4px 4px 0",border:"1px solid #1E2335"}}>
                  <div style={{fontSize:12,fontWeight:600,marginLeft:14,marginBottom:6,color:d.c}}>{d.l} <span style={{color:"#666",fontWeight:400}}>({total} pcs)</span></div>
                  <ResponsiveContainer width="100%" height={130}><BarChart data={chartData} margin={{left:0,right:4,top:2,bottom:2}}><XAxis dataKey="id" tick={{fontSize:7,fill:"#555"}} interval={19}/><YAxis tick={{fontSize:8,fill:"#555"}} width={30}/><Tooltip contentStyle={{background:"#1A1F30",border:"1px solid #2A2F45",borderRadius:8,fontSize:11}} formatter={v=>[v,d.l]}/><Bar dataKey={d.k} fill={d.c} radius={[2,2,0,0]}/></BarChart></ResponsiveContainer>
                </div>
              );
            })}
          </div>
        </div>)}

        {/* ── MONTHLY ── */}
        {view==="monthly"&&(<div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Monthly — Active Defects Only</div>
          {(()=>{
            const mo={};filtered.forEach((r)=>{const m="2026-"+r.d.substring(0,2);if(!mo[m])mo[m]={month:m,painted:0,rejected:0};mo[m].painted+=r.p;mo[m].rejected+=r.r_adj;activeDefs.forEach(d=>{mo[m][d.k]=(mo[m][d.k]||0)+r[d.k];});});
            const monthly=Object.values(mo).sort((a,b)=>a.month.localeCompare(b.month)).map(m=>({...m,sr:m.painted>0?+(m.rejected/m.painted*100).toFixed(1):0}));
            return(<div>
              <div style={{background:"#141826",borderRadius:10,padding:"16px 8px 8px 0",border:"1px solid #1E2335"}}><ResponsiveContainer width="100%" height={300}><BarChart data={monthly} margin={{left:10,right:10,top:5,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke="#1E2335"/><XAxis dataKey="month" tick={{fontSize:12,fill:"#999"}}/><YAxis tick={{fontSize:10,fill:"#666"}}/><Tooltip contentStyle={{background:"#1A1F30",border:"1px solid #2A2F45",borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:11}}/>{activeDefs.map(d=><Bar key={d.k} dataKey={d.k} name={d.l} stackId="1" fill={d.c}/>)}</BarChart></ResponsiveContainer></div>
              <div style={{marginTop:16,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {monthly.map((m,i)=><div key={i} style={{background:"#141826",borderRadius:10,padding:"14px",border:"1px solid #1E2335"}}><div style={{fontSize:11,color:"#777",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{m.month}</div><div style={{fontSize:22,fontWeight:700,color:m.sr>50?"#E63946":m.sr>30?"#F4A261":"#2A9D8F"}}>{m.sr}%</div><div style={{fontSize:11,color:"#555"}}>{m.rejected.toLocaleString()} / {m.painted.toLocaleString()} parts</div></div>)}
              </div>
            </div>);
          })()}
        </div>)}

        <div style={{marginTop:28,fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",textAlign:"center"}}>PROPAINT Interactive &middot; Toggle defects to recalculate all KPIs, charts, Pareto &middot; Benteng SQE 2026</div>
      </div>
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
